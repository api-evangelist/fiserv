    - type: NaftikoCapability
      url: capabilities/bankinghub-transactions.yaml
    - type: NaftikoCapability
      url: capabilities/bankinghub-transfers.yaml
    description: The Fiserv BankingHub API provides RESTful access to core banking operations including account management,
      transactions, transfers, payments, and party (customer) management. BankingHub enables financial institutions and fintech
      partners to integrate account opening, fund transfers, payment processing, and customer data management into their applications.
  - aid: fiserv:carddeveloper
    name: Fiserv CardDeveloper API
    tags:
    - Accounts
    - Authorizations
    - Cards
    - Statements
    humanURL: https://developer.fiserv.com/product/CardDeveloper
    properties:
    - url: https://developer.fiserv.com/product/CardDeveloper/docs/?path=docs/gettingstarted/getting-started.md
      type: Documentation
    - url: openapi/fiserv-carddeveloper-openapi.yml
      type: OpenAPI
    - type: NaftikoCapability
