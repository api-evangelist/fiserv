    description: The Fiserv CardDeveloper API enables financial institutions and cardholders to manage card and account information
      through various touchpoints. The API supports account creation, card management, authorization management, transaction
      inquiry, limit management, and statement retrieval for credit and debit card programs.
  - aid: fiserv:payment-events
    name: Fiserv Payment Events
    tags:
    - Disputes
    - Events
    - Payments
    - Webhooks
    humanURL: https://docs.fiserv.dev/public/docs/webhooks-and-status-updates-checkout
    properties:
    - url: https://docs.fiserv.dev/public/docs/webhooks-and-status-updates-checkout
      type: Documentation
    - url: asyncapi/fiserv-payment-events-asyncapi.yml
      type: AsyncAPI
    description: Fiserv provides webhook-based event notifications across the payments lifecycle. Merchants can subscribe to
      webhooks to receive real-time notifications for key events including transaction status changes, settlement updates, dispute
      notifications, and checkout completions.
