    description: The CardPointe Gateway API provides a RESTful interface for integrating secure tokenization, payment processing,
      and reporting features into applications and websites. The API supports authorization, capture, void, refund, and inquiry
      operations, as well as customer profile management for storing payment credentials securely.
  - aid: fiserv:bankinghub
    name: Fiserv BankingHub API
    tags:
    - Accounts
    - Banking
    - Payments
    - Transfers
    humanURL: https://developer.fiserv.com/product/BankingHub
    properties:
    - url: https://developer.fiserv.com/product/BankingHub/docs/?path=docs/get-started.md
      type: Documentation
    - url: openapi/fiserv-bankinghub-openapi.yml
      type: OpenAPI
