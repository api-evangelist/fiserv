naftiko: 1.0.0-alpha2
info:
  label: Fiserv CardPointe Gateway API — Authorization
  description: 'Fiserv CardPointe Gateway API — Authorization. 1 operations. Lead operation: Fiserv Authorize a payment transaction.
    Self-contained Naftiko capability covering one Fiserv business surface.'
  tags:
  - Fiserv
  - Authorization
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FISERV_API_KEY: FISERV_API_KEY
capability:
  consumes:
  - type: http
    namespace: cardpointe-gateway-authorization
    baseUri: https://{site}-uat.cardconnect.com/cardconnect/rest
    description: Fiserv CardPointe Gateway API — Authorization business capability. Self-contained, no shared references.
    resources:
    - name: auth
      path: /auth
      operations:
      - name: authorizetransaction
        method: PUT
        description: Fiserv Authorize a payment transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FISERV_USER}}'
      password: '{{env.FISERV_PASS}}'
  exposes:
  - type: rest
    namespace: cardpointe-gateway-authorization-rest
    port: 8080
    description: REST adapter for Fiserv CardPointe Gateway API — Authorization. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/auth
      name: auth
      description: REST surface for auth.
      operations:
      - method: PUT
        name: authorizetransaction
        description: Fiserv Authorize a payment transaction
        call: cardpointe-gateway-authorization.authorizetransaction
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cardpointe-gateway-authorization-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fiserv CardPointe Gateway API — Authorization. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: fiserv-authorize-payment-transaction
      description: Fiserv Authorize a payment transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cardpointe-gateway-authorization.authorizetransaction
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
