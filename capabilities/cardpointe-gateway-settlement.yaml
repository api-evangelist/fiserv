naftiko: 1.0.0-alpha2
info:
  label: Fiserv CardPointe Gateway API — Settlement
  description: 'Fiserv CardPointe Gateway API — Settlement. 1 operations. Lead operation: Fiserv Get settlement status. Self-contained
    Naftiko capability covering one Fiserv business surface.'
  tags:
  - Fiserv
  - Settlement
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FISERV_API_KEY: FISERV_API_KEY
capability:
  consumes:
  - type: http
    namespace: cardpointe-gateway-settlement
    baseUri: https://{site}-uat.cardconnect.com/cardconnect/rest
    description: Fiserv CardPointe Gateway API — Settlement business capability. Self-contained, no shared references.
    resources:
    - name: settlestat
      path: /settlestat
      operations:
      - name: getsettlementstatus
        method: GET
        description: Fiserv Get settlement status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: merchid
          in: query
          type: string
          description: The CardPointe merchant ID.
          required: true
        - name: date
          in: query
          type: string
          description: The settlement date in MMDD format.
          required: true
    authentication:
      type: basic
      username: '{{env.FISERV_USER}}'
      password: '{{env.FISERV_PASS}}'
  exposes:
  - type: rest
    namespace: cardpointe-gateway-settlement-rest
    port: 8080
    description: REST adapter for Fiserv CardPointe Gateway API — Settlement. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/settlestat
      name: settlestat
      description: REST surface for settlestat.
      operations:
      - method: GET
        name: getsettlementstatus
        description: Fiserv Get settlement status
        call: cardpointe-gateway-settlement.getsettlementstatus
        with:
          merchid: rest.merchid
          date: rest.date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cardpointe-gateway-settlement-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fiserv CardPointe Gateway API — Settlement. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: fiserv-get-settlement-status
      description: Fiserv Get settlement status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cardpointe-gateway-settlement.getsettlementstatus
      with:
        merchid: tools.merchid
        date: tools.date
      outputParameters:
      - type: object
        mapping: $.
