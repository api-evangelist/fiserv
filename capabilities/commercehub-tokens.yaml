naftiko: 1.0.0-alpha2
info:
  label: Fiserv CommerceHub API — Tokens
  description: 'Fiserv CommerceHub API — Tokens. 1 operations. Lead operation: Fiserv Create a payment token. Self-contained
    Naftiko capability covering one Fiserv business surface.'
  tags:
  - Fiserv
  - Tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FISERV_API_KEY: FISERV_API_KEY
capability:
  consumes:
  - type: http
    namespace: commercehub-tokens
    baseUri: https://connect-cert.fiservapis.com/ch
    description: Fiserv CommerceHub API — Tokens business capability. Self-contained, no shared references.
    resources:
    - name: payments-vas-v1-tokens
      path: /payments-vas/v1/tokens
      operations:
      - name: createtoken
        method: POST
        description: Fiserv Create a payment token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Api-Key
      value: '{{env.FISERV_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: commercehub-tokens-rest
    port: 8080
    description: REST adapter for Fiserv CommerceHub API — Tokens. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/payments-vas/v1/tokens
      name: payments-vas-v1-tokens
      description: REST surface for payments-vas-v1-tokens.
      operations:
      - method: POST
        name: createtoken
        description: Fiserv Create a payment token
        call: commercehub-tokens.createtoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commercehub-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fiserv CommerceHub API — Tokens. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: fiserv-create-payment-token
      description: Fiserv Create a payment token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: commercehub-tokens.createtoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
