naftiko: 1.0.0-alpha2
info:
  label: Fiserv CardPointe Gateway API — Signature Capture
  description: 'Fiserv CardPointe Gateway API — Signature Capture. 1 operations. Lead operation: Fiserv Submit a signature
    capture. Self-contained Naftiko capability covering one Fiserv business surface.'
  tags:
  - Fiserv
  - Signature Capture
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FISERV_API_KEY: FISERV_API_KEY
capability:
  consumes:
  - type: http
    namespace: cardpointe-gateway-signature-capture
    baseUri: https://{site}-uat.cardconnect.com/cardconnect/rest
    description: Fiserv CardPointe Gateway API — Signature Capture business capability. Self-contained, no shared references.
    resources:
    - name: sigcap
      path: /sigcap
      operations:
      - name: submitsignaturecapture
        method: PUT
        description: Fiserv Submit a signature capture
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FISERV_USER}}'
      password: '{{env.FISERV_PASS}}'
  exposes:
  - type: rest
    namespace: cardpointe-gateway-signature-capture-rest
    port: 8080
    description: REST adapter for Fiserv CardPointe Gateway API — Signature Capture. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/sigcap
      name: sigcap
      description: REST surface for sigcap.
      operations:
      - method: PUT
        name: submitsignaturecapture
        description: Fiserv Submit a signature capture
        call: cardpointe-gateway-signature-capture.submitsignaturecapture
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cardpointe-gateway-signature-capture-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fiserv CardPointe Gateway API — Signature Capture. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: fiserv-submit-signature-capture
      description: Fiserv Submit a signature capture
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cardpointe-gateway-signature-capture.submitsignaturecapture
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
