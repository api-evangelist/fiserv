naftiko: 1.0.0-alpha2
info:
  label: Fiserv CommerceHub API — Charges
  description: 'Fiserv CommerceHub API — Charges. 1 operations. Lead operation: Fiserv Process a payment charge. Self-contained
    Naftiko capability covering one Fiserv business surface.'
  tags:
  - Fiserv
  - Charges
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FISERV_API_KEY: FISERV_API_KEY
capability:
  consumes:
  - type: http
    namespace: commercehub-charges
    baseUri: https://connect-cert.fiservapis.com/ch
    description: Fiserv CommerceHub API — Charges business capability. Self-contained, no shared references.
    resources:
    - name: payments-v1-charges
      path: /payments/v1/charges
      operations:
      - name: createcharge
        method: POST
        description: Fiserv Process a payment charge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Api-Key
      value: '{{env.FISERV_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: commercehub-charges-rest
    port: 8080
    description: REST adapter for Fiserv CommerceHub API — Charges. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/payments/v1/charges
      name: payments-v1-charges
      description: REST surface for payments-v1-charges.
      operations:
      - method: POST
        name: createcharge
        description: Fiserv Process a payment charge
        call: commercehub-charges.createcharge
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commercehub-charges-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fiserv CommerceHub API — Charges. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: fiserv-process-payment-charge
      description: Fiserv Process a payment charge
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: commercehub-charges.createcharge
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
