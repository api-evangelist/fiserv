naftiko: 1.0.0-alpha2
info:
  label: Fiserv CommerceHub API — Cancels
  description: 'Fiserv CommerceHub API — Cancels. 1 operations. Lead operation: Fiserv Cancel or void a transaction. Self-contained
    Naftiko capability covering one Fiserv business surface.'
  tags:
  - Fiserv
  - Cancels
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FISERV_API_KEY: FISERV_API_KEY
capability:
  consumes:
  - type: http
    namespace: commercehub-cancels
    baseUri: https://connect-cert.fiservapis.com/ch
    description: Fiserv CommerceHub API — Cancels business capability. Self-contained, no shared references.
    resources:
    - name: payments-v1-charges-transactionId-cancel
      path: /payments/v1/charges/{transactionId}/cancel
      operations:
      - name: cancelcharge
        method: POST
        description: Fiserv Cancel or void a transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Api-Key
      value: '{{env.FISERV_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: commercehub-cancels-rest
    port: 8080
    description: REST adapter for Fiserv CommerceHub API — Cancels. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/payments/v1/charges/{transactionid}/cancel
      name: payments-v1-charges-transactionid-cancel
      description: REST surface for payments-v1-charges-transactionId-cancel.
      operations:
      - method: POST
        name: cancelcharge
        description: Fiserv Cancel or void a transaction
        call: commercehub-cancels.cancelcharge
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commercehub-cancels-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fiserv CommerceHub API — Cancels. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: fiserv-cancel-void-transaction
      description: Fiserv Cancel or void a transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: commercehub-cancels.cancelcharge
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
