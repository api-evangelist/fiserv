naftiko: 1.0.0-alpha2
info:
  label: Fiserv BankingHub API — Transfers
  description: 'Fiserv BankingHub API — Transfers. 2 operations. Lead operation: Fiserv Initiate a fund transfer. Self-contained
    Naftiko capability covering one Fiserv business surface.'
  tags:
  - Fiserv
  - Transfers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FISERV_API_KEY: FISERV_API_KEY
capability:
  consumes:
  - type: http
    namespace: bankinghub-transfers
    baseUri: https://cert.api.fiservapps.com
    description: Fiserv BankingHub API — Transfers business capability. Self-contained, no shared references.
    resources:
    - name: banking-transfers
      path: /banking/transfers
      operations:
      - name: createtransfer
        method: POST
        description: Fiserv Initiate a fund transfer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: banking-transfers-transferId
      path: /banking/transfers/{transferId}
      operations:
      - name: gettransfer
        method: GET
        description: Fiserv Retrieve transfer details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: transferId
          in: path
          type: string
          description: The unique transfer identifier.
          required: true
    authentication:
      type: bearer
      token: '{{env.FISERV_API_KEY}}'
  exposes:
  - type: rest
    namespace: bankinghub-transfers-rest
    port: 8080
    description: REST adapter for Fiserv BankingHub API — Transfers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/banking/transfers
      name: banking-transfers
      description: REST surface for banking-transfers.
      operations:
      - method: POST
        name: createtransfer
        description: Fiserv Initiate a fund transfer
        call: bankinghub-transfers.createtransfer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/banking/transfers/{transferid}
      name: banking-transfers-transferid
      description: REST surface for banking-transfers-transferId.
      operations:
      - method: GET
        name: gettransfer
        description: Fiserv Retrieve transfer details
        call: bankinghub-transfers.gettransfer
        with:
          transferId: rest.transferId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bankinghub-transfers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fiserv BankingHub API — Transfers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: fiserv-initiate-fund-transfer
      description: Fiserv Initiate a fund transfer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bankinghub-transfers.createtransfer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fiserv-retrieve-transfer-details
      description: Fiserv Retrieve transfer details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bankinghub-transfers.gettransfer
      with:
        transferId: tools.transferId
      outputParameters:
      - type: object
        mapping: $.
